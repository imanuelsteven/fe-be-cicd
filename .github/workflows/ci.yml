name: Build, Push & Deploy Docker
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  BACKEND_IMAGE: imanuelsteven/backend-loan-service
  FRONTEND_IMAGE: imanuelsteven/frontend-loan-service
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  build-push:
    name: Build & Push
    runs-on:
      - self-hosted
      - docker-local-cicd
    steps:
      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Show Runner Information
      - name: Show Runner Information
        run: |
          echo "Runner Name : $RUNNER_NAME"
          docker --version
          docker compose version

      # Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #################################################
      # Backend
      #################################################
      - name: Build Backend Image
        run: |
          docker build \
            -t $BACKEND_IMAGE:$IMAGE_TAG \
            -t $BACKEND_IMAGE:latest \
            ./aegira-loan-service

      - name: Push Backend Image
        run: |
          docker push $BACKEND_IMAGE:$IMAGE_TAG
          docker push $BACKEND_IMAGE:latest

      #################################################
      # Frontend
      #################################################
      - name: Build Frontend Image
        run: |
          docker build \
            -t $FRONTEND_IMAGE:$IMAGE_TAG \
            -t $FRONTEND_IMAGE:latest \
            ./creditappdemo

      - name: Push Frontend Image
        run: |
          docker push $FRONTEND_IMAGE:$IMAGE_TAG
          docker push $FRONTEND_IMAGE:latest

  deploy:
    name: Deploy
    needs: build-push
    runs-on:
      - self-hosted
      - docker-local-cicd
    steps:
      # Checkout Repository (butuh file docker-compose.yml)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Login Docker Hub (untuk docker compose pull)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #################################################
      # Pull Latest Images
      #################################################
      - name: Pull Images
        run: docker compose pull

      #################################################
      # Deploy
      #################################################
      - name: Start Containers
        run: docker compose up -d

      #################################################
      # Verification
      #################################################
      - name: Show Docker Compose Status
        run: docker compose ps

      - name: Show Docker Containers
        run: docker ps

      #################################################
      # Logs if Failed
      #################################################
      - name: Backend Logs
        if: failure()
        run: docker compose logs backend

      - name: Frontend Logs
        if: failure()
        run: docker compose logs frontend
