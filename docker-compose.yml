services:
  postgres:
    image: postgres:15-alpine
    # image: postgres:15
    container_name: postgresql-image
    environment:
      POSTGRES_DB: aegira_loan
      POSTGRES_USER: aegira
      POSTGRES_PASSWORD: aegira_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegira -d aegira_loan"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database Redis

  redis:
    image: redis:5.0.3-alpine
    # image: redis:5.0.3
    container_name: redis-image
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Backend service kita
  backend:
    image: imanuelsteven/backend-loan-service:latest
    container_name: backend-image
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aegira_loan
      SPRING_DATASOURCE_USERNAME: aegira
      SPRING_DATASOURCE_PASSWORD: aegira_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-this-secret
      JWT_EXPIRATION: 3600000
      LOAN_DATA_SOURCE_MODE: ${LOAN_DATA_SOURCE_MODE:-DATABASE}
      IDEMPOTENCY_ENABLED: ${IDEMPOTENCY_ENABLED:-true}
      IDEMPOTENCY_TTL_SECONDS: 86400

  # Frontend service kita
  frontend:
    image: imanuelsteven/frontend-loan-service:latest
    container_name: frontend-image
    ports:
      - "3000:80"
    depends_on:
      - backend
    mem_limit: 128m
    cpus: 0.25

# Folder / volume untuk menyimpan data postgre dan redis
volumes:
  postgres_data:
  redis_data:
